<!DOCTYPE html>
<html>
<head>
    <title>Watt Clicker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1> Watt Clicker</h1>

<div id="stats">
    <p>Combat Points: <span id="cp">0</span></p>
    <p>CP per second: <span id="cps">0</span></p>
</div>

<button id="clickButton">Generate CP</button>

<h2>Sell to Buyers</h2>
<button onclick="sellCP()">Sell All CP</button>
<p>Money: $<span id="money">0</span></p>

<h2>Home Depot Upgrades</h2>

<button onclick="buyUpgrade('drill')">
Buy Power Drill ($25)
</button>

<button onclick="buyUpgrade('generator')">
Buy Generator ($100)
</button>

<button onclick="buyUpgrade('contractor')">
Hire Contractor ($500)
</button>

<script src="game.js"></script>

</body>
</html>
