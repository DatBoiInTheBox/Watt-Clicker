<!DOCTYPE html>
<html>

<head>

<title>Watt Clicker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Watt Clicker</h1>

<div id="stats">

<p>Stored CP: <span id="cp">0 MB</span></p>
<p>Storage: <span id="storage">0 / 1 GB</span></p>
<p>Money: $<span id="money">0</span></p>

</div>

<button id="clickButton">Generate CP</button>

<hr>

<button onclick="openCPBook()">Open CPBook</button>
<button onclick="openDepot()">Open Home Depot</button>

<div id="cpbookApp" class="app hidden">
<h2>CPBook</h2>
<div id="buyers"></div>
<button onclick="closeCPBook()">Exit</button>
</div>

<div id="depotApp" class="app hidden">
    <h2 style="color:#ff6600">Home Depot</h2>
    <div id="upgradeList"></div>
    <button onclick="closeDepot()" style="background:#ff6600;color:white;padding:10px;margin-top:10px;">Exit Home Depot</button>
</div>

<script src="js/game.js"></script>
<script src="js/storage.js"></script>
<script src="js/buyers.js"></script>
<script src="js/cpbook.js"></script>
<script src="js/homedepot.js"></script>

</body>
</html>
